name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    name: CI
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Freeze Guard
        shell: pwsh
        run: |
          $base = ""
          if ("${{ github.event_name }}" -eq "pull_request") {
            $base = "${{ github.event.pull_request.base.sha }}"
          } elseif ("${{ github.event.before }}" -and "${{ github.event.before }}" -ne "0000000000000000000000000000000000000000") {
            $base = "${{ github.event.before }}"
          }
          ./scripts/ci/language_freeze_guard.ps1 -Base $base -Head "${{ github.sha }}"
      - name: AnyBox Guard
        shell: pwsh
        run: ./scripts/ci/anybox_policy_guard.ps1
      - name: WinAPI Raw Regen And Windows-Sys Parity Guard
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File ./scripts/dev/regenerate-winapi-raw.ps1 -Check
      - name: Cargo Fmt
        run: cargo fmt --all -- --check
      - name: Cargo Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Cargo Test
        run: cargo test --workspace
