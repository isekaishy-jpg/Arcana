[package]
name = "arcana-cli"
version.workspace = true
edition.workspace = true

[dependencies]
arcana-aot.workspace = true
arcana-frontend.workspace = true
arcana-ir.workspace = true
arcana-package.workspace = true
arcana-runtime.workspace = true
toml.workspace = true

[dev-dependencies]
libloading.workspace = true

[target.'cfg(windows)'.dev-dependencies]
windows-sys = { workspace = true, features = [
    "Win32_Foundation",
    "Win32_UI_Input_Ime",
    "Win32_UI_WindowsAndMessaging",
] }

[[bin]]
name = "arcana"
path = "src/main.rs"
